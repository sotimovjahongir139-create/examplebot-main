version: "3.9"

services:
  bot:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python main.py"
    env_file:
      - .env
    volumes:
      - ./:/app
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bot
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:

